# NOUVEAU : configuration centralisée pour pytest, coverage, mypy, flake8

[tool:pytest]
testpaths = tests
addopts = -v --tb=short

[coverage:run]
source = src/mon_app
omit = tests/*

[coverage:report]
show_missing = True
fail_under = 80

[flake8]
max-line-length = 88
exclude = .git,__pycache__

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True

