name: Python Tests - CI complet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # NOUVEAU : v4 au lieu de v3

      - name: Set up Python
        uses: actions/setup-python@v5    # NOUVEAU : v5
        with:
          python-version: "3.12"

      - name: Cache pip                  # NOUVEAU : cache = CI plus rapide
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint avec flake8           # NOUVEAU
        run: flake8 src/ tests/

      - name: Type check avec mypy       # NOUVEAU
        run: mypy src/

  test:
    name: Tests Python ${{ matrix.python-version }}
    needs: lint                          # NOUVEAU : lint d'abord
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                   # NOUVEAU : voir tous les échecs
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests avec coverage
        run: |
          pytest --cov=src/mon_app --cov-report=term-missing --cov-fail-under=80

      - name: Generate HTML report
        run: coverage html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/

